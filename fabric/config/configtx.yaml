---
Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: ../organizations/ordererOrganizations/medivault.local/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer.medivault.local:7050

  - &Hospital1
    Name: Hospital1MSP
    ID: Hospital1MSP
    MSPDir: ../organizations/peerOrganizations/hospital1.medivault.local/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Hospital1MSP.admin','Hospital1MSP.peer','Hospital1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Hospital1MSP.admin','Hospital1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Hospital1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Hospital1MSP.peer')"
    AnchorPeers:
      - Host: peer0.hospital1.medivault.local
        Port: 7051

  - &Hospital2
    Name: Hospital2MSP
    ID: Hospital2MSP
    MSPDir: ../organizations/peerOrganizations/hospital2.medivault.local/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Hospital2MSP.admin','Hospital2MSP.peer','Hospital2MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Hospital2MSP.admin','Hospital2MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Hospital2MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Hospital2MSP.peer')"
    AnchorPeers:
      - Host: peer0.hospital2.medivault.local
        Port: 7051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.medivault.local:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.medivault.local
        Port: 7050
        ClientTLSCert: ../organizations/ordererOrganizations/medivault.local/orderers/orderer.medivault.local/tls/server.crt
        ServerTLSCert: ../organizations/ordererOrganizations/medivault.local/orderers/orderer.medivault.local/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  TwoOrgsOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Consortiums:
      MediVaultConsortium:
        Organizations:
          - *Hospital1
          - *Hospital2

  TwoOrgsChannel:
    Consortium: MediVaultConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Hospital1
        - *Hospital2
      Capabilities:
        <<: *ApplicationCapabilities
